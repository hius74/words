<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Card</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div id="content">
        <!-- card content -->
    </div>
    <button id="first-button">First button</button>
    <button id="second-button">Second button</button>

    <script>
        // XML document must have single root tag
        const str = `<card>
            <div id="front_1">Hij is daar nog niet ann [...].</div>
            <div id="front_2">Het woord [...] betekent dat iemand iets vaak heeft meegemaakt of gedaan, waardoor het normaal of bekend voor hem of haar voelt.</div>
            <div id="front_3" lang="ru">привыкший</div>

            <div id="back_1">Het woord 'gewend' betekent dat iemand iets vaak heeft meegemaakt of gedaan, waardoor het normaal of bekend voor hem of haar voelt.</div>
            <div id="back_2" lang="ru">Он к этому ещё не привык.</div>
        </card>`;

        const card = new DOMParser().parseFromString(str, "text/xml");
        const content = document.getElementById('content');
        content.append(card.getElementById('front_1'));

        let state = 1;

        const firstButton = document.getElementById('first-button');
        firstButton.addEventListener('click', () => {
            state = ++state;
            const item = card.getElementById(`front_${state}`);
            if (item != null) {
                console.log(`Add content: ${item}`);
                content.append(item);
            } else {
                console.log(`Content is empty for state: ${state}`);
            }
        })
        const secondButton = document.getElementById('second-button');
        secondButton.addEventListener('click', (event) => {
            console.log(JSON.stringify(event, null, 2));
        })
    </script>
</body>
</html>
