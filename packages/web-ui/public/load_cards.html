<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Load new words into browser storage</title>
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="./style.css" />
    <link rel="icon" href="./favicon.svg" />
    <link rel="canonical" href="." />
</head>
<body>
    <script src="./load_cards.js" type="module" defer></script>
    <nav>
        <a href="./learn_cards.html">Learn cards</a>
    </nav>
    <main>
        <header>
            <h1>Load new words into browser storage</h1>
        </header>
        <section class="content">
            <h2>Load new words into browser storage</h2>
            <label for="load-cards-file">Select file: </label>
            <input type="file" id="load-cards-file" accept=".ndjson,.jsonl,.txt" />
        </section>
        <section class="content">
            <h2>Export all records from browser storage</h2>
            <label for="export-all">Download all cards from the storage</label>
            <button id="export-all">Export all</button>
        </section>
    </main>
</body>
</html>
